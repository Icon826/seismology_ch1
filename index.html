<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學 第一章 互動學堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    
    <style>
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg) translateX(-2px); }
            50% { transform: rotate(3deg) translateX(2px); }
        }
        @keyframes sink {
            0%, 100% { transform: translate(-50%, 0) rotate(0); }
            50% { transform: translate(-50%, 40px) rotate(5deg); }
        }
        .animate-wiggle { animation: wiggle 1s ease-in-out infinite; }
        .animate-sink { animation: sink 4s infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 模擬 Lucide React 組件
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    // 清除舊內容並重新渲染圖示
                    iconRef.current.innerHTML = '';
                    const iconElement = lucide.createIcons({
                        icons: { [name]: lucide[name] },
                        attrs: { 
                            strokeWidth: 2,
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-block" />;
        };

        // --- 動態小組件：震波模擬 ---
        const WaveAnimation = () => (
            <div className="w-full h-32 bg-slate-900 rounded-lg overflow-hidden relative flex items-center justify-center mb-4">
                <div className="absolute left-4 text-white text-xs font-mono">Source 💥</div>
                <div className="flex gap-1">
                    {[...Array(20)].map((_, i) => (
                        <div 
                            key={i} 
                            className="w-2 h-12 bg-blue-400 rounded-full animate-bounce"
                            style={{ animationDelay: `${i * 0.1}s`, animationDuration: '1s' }}
                        />
                    ))}
                </div>
                <div className="absolute right-4 text-white text-xs font-mono">Receiver 📡</div>
            </div>
        );

        // --- 動態小組件：建築共振 ---
        const BuildingResonance = () => (
            <div className="w-full h-40 bg-gray-200 rounded-lg relative flex items-end justify-around p-4 border-b-4 border-gray-400">
                <div className="flex flex-col items-center">
                    <div className="w-8 h-12 bg-orange-400 border-2 border-orange-600 animate-wiggle" style={{animationDuration: '0.5s'}} />
                    <span className="text-[10px] mt-1">矮房(高頻)</span>
                </div>
                <div className="flex flex-col items-center">
                    <div className="w-10 h-20 bg-blue-400 border-2 border-blue-600 animate-wiggle" style={{animationDuration: '1s'}} />
                    <span className="text-[10px] mt-1">中樓</span>
                </div>
                <div className="flex flex-col items-center">
                    <div className="w-12 h-32 bg-emerald-400 border-2 border-emerald-600 animate-wiggle" style={{animationDuration: '2s'}} />
                    <span className="text-[10px] mt-1">高樓(低頻)</span>
                </div>
            </div>
        );

        const Card = ({ title, children, iconName, color = "blue", initialOpen = true }) => {
            const [isOpen, setIsOpen] = useState(initialOpen);
            const colorClasses = {
                blue: "border-blue-500 bg-blue-50",
                red: "border-red-500 bg-red-50",
                green: "border-green-500 bg-green-50",
                amber: "border-amber-500 bg-amber-50"
            };
            const iconColor = {
                blue: "text-blue-600",
                red: "text-red-600",
                green: "text-green-600",
                amber: "text-amber-600"
            };

            return (
                <div className={`mb-8 border-l-4 rounded-r-xl shadow-lg overflow-hidden transition-all duration-300 ${colorClasses[color]}`}>
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between p-4 bg-white hover:bg-gray-50">
                        <div className="flex items-center gap-3">
                            <Icon name={iconName} className={iconColor[color]} size={24} />
                            <h2 className="text-xl font-bold text-gray-800">{title}</h2>
                        </div>
                        <Icon name={isOpen ? "ChevronUp" : "ChevronDown"} size={20} />
                    </button>
                    {isOpen && <div className="p-6 text-gray-700">{children}</div>}
                </div>
            );
        };

        const Quiz = ({ question, options, answer, explanation }) => {
            const [selected, setSelected] = useState(null);
            return (
                <div className="mt-6 p-5 bg-white rounded-xl border-2 border-dashed border-purple-200 shadow-inner">
                    <p className="font-bold mb-4 flex items-center gap-2 text-purple-800">
                        <Icon name="HelpCircle" size={20} /> {question}
                    </p>
                    <div className="grid gap-2">
                        {options.map((opt, idx) => (
                            <button key={idx} onClick={() => setSelected(idx)}
                                className={`w-full text-left p-4 rounded-lg border-2 transition-all ${
                                    selected === idx 
                                        ? (idx === answer ? "bg-green-100 border-green-500 ring-2 ring-green-200" : "bg-red-100 border-red-500 ring-2 ring-red-200")
                                        : "hover:bg-gray-50 border-gray-200"
                                }`}
                            >
                                {opt}
                            </button>
                        ))}
                    </div>
                    {selected !== null && (
                        <div className={`mt-4 p-4 rounded-lg flex gap-3 ${selected === answer ? "bg-green-50 text-green-800" : "bg-red-50 text-red-800"}`}>
                            <Icon name={selected === answer ? "CheckCircle2" : "XCircle"} className="shrink-0" />
                            <p className="text-sm"><strong>{selected === answer ? "太棒了！" : "喔不！"}</strong> {explanation}</p>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    <header className="max-w-4xl mx-auto text-center mb-12 relative">
                        <h1 className="text-4xl md:text-6xl font-black text-slate-800 mb-4 tracking-tight">
                            地震學 <span className="text-red-600">第一章</span> 互動學堂
                        </h1>
                        <div className="inline-block px-4 py-1 bg-red-600 text-white rounded-full text-sm font-bold mb-4">大師親授 🎓</div>
                        <p className="text-xl text-slate-600 italic max-w-2xl mx-auto">
                            「地球正在開派對，我們負責聽它的重低音！跟我一起探索腳底下的秘密吧。」
                        </p>
                    </header>

                    <main className="max-w-4xl mx-auto">
                        <Card title="1. 地震學研究範疇" iconName="Globe" color="blue">
                            <WaveAnimation />
                            <p className="mb-4 text-lg">地震學是研究彈性波在地球內部的「旅遊筆記」。</p>
                            <div className="grid grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-lg border text-center">
                                    <Icon name="Zap" className="text-yellow-500 mx-auto" />
                                    <h4 className="font-bold">震源</h4>
                                </div>
                                <div className="bg-white p-4 rounded-lg border text-center">
                                    <Icon name="Activity" className="text-blue-500 mx-auto" />
                                    <h4 className="font-bold">路徑</h4>
                                </div>
                                <div className="bg-white p-4 rounded-lg border text-center">
                                    <Icon name="Wind" className="text-green-500 mx-auto" />
                                    <h4 className="font-bold">接收器</h4>
                                </div>
                            </div>
                        </Card>

                        <Card title="3. Hazard vs Risk：天災與人禍" iconName="AlertTriangle" color="red">
                            <div className="grid md:grid-cols-2 gap-4 mb-6">
                                <div className="p-4 bg-white rounded-xl shadow-sm border-t-4 border-red-500">
                                    <h4 className="font-bold text-red-600 text-lg mb-2 italic">Seismic Hazard</h4>
                                    <p className="text-sm"><strong>大自然的肌力：</strong> 某個地方搖晃的可能性。</p>
                                </div>
                                <div className="p-4 bg-white rounded-xl shadow-sm border-t-4 border-orange-500">
                                    <h4 className="font-bold text-orange-600 text-lg mb-2 italic">Seismic Risk</h4>
                                    <p className="text-sm"><strong>風險：</strong> Hazard × 曝險 × 脆弱度。</p>
                                </div>
                            </div>
                            <Quiz 
                                question="如果在斷層帶上蓋一棟紙糊的醫院，這會影響 Hazard 還是 Risk？"
                                options={["會讓 Hazard 變大", "會讓 Risk 變大", "只會被大師罵"]}
                                answer={1}
                                explanation="沒錯！你不能控制地震晃多大 (Hazard)，但你可以決定建築強韌度 (Risk)。"
                            />
                        </Card>

                        <Card title="6. 房子、建材與致命共振" iconName="Home" color="blue">
                            <BuildingResonance />
                            <div className="mt-6 grid md:grid-cols-2 gap-6">
                                <div className="bg-blue-100 p-4 rounded-xl border-l-4 border-blue-500">
                                    <h4 className="font-bold mb-2">建材排排站</h4>
                                    <ul className="text-sm space-y-2">
                                        <li>❌ 土石牆 | ⚠️ 磚牆 | ✅ RC (鋼筋混泥土) | 🌟 SS (鋼骨)</li>
                                    </ul>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <h4 className="font-bold mb-2">為什麼矮房也會倒？</h4>
                                    <p className="text-sm">當地震波頻率對上房子的自然頻率，就會發生<strong>共振</strong>。</p>
                                </div>
                            </div>
                        </Card>

                        <Card title="7. 土壤液化：陸地上的流沙" iconName="Waves" color="amber">
                            <div className="flex flex-col md:flex-row gap-6 items-center">
                                <div className="flex-1 space-y-4">
                                    <div className="bg-amber-100 p-4 rounded-lg border-2 border-amber-400">
                                        <h4 className="font-bold text-amber-800">液化三部曲：</h4>
                                        <p className="text-sm">鬆散砂土 + 水填滿縫隙 + 地震猛搖</p>
                                    </div>
                                </div>
                                <div className="w-full md:w-64 h-48 bg-sky-200 rounded-2xl relative overflow-hidden flex flex-col justify-end p-2 border-4 border-amber-900 shadow-inner">
                                    <div className="absolute top-10 left-1/2 -translate-x-1/2 w-20 h-24 bg-red-500 rounded border-2 border-red-700 animate-sink shadow-xl">
                                        <div className="flex flex-wrap p-1"><div className="w-3 h-3 bg-white/50 m-1" /><div className="w-3 h-3 bg-white/50 m-1" /></div>
                                    </div>
                                    <div className="h-20 w-full bg-amber-400 opacity-80 flex items-center justify-center font-bold text-amber-900">液化層</div>
                                </div>
                            </div>
                        </Card>

                        <Card title="11. 核武監測" iconName="ShieldAlert" color="red">
                            <div className="bg-slate-900 p-6 rounded-2xl border-4 border-red-900 text-white mb-6">
                                <h4 className="font-bold mb-4 flex items-center gap-2"><Icon name="Zap" className="text-red-500" /> 爆炸 vs 地震</h4>
                                <div className="grid grid-cols-2 gap-4 text-xs">
                                    <div className="border-l-2 border-red-500 pl-2"><strong>爆炸：</strong>P波超強。</div>
                                    <div className="border-l-2 border-blue-500 pl-2"><strong>地震：</strong>S波超大。</div>
                                </div>
                            </div>
                            <Quiz 
                                question="為什麼可以用地震學抓核爆？"
                                options={["聞到炸彈味", "波形特徵不同", "地球會停轉"]}
                                answer={1}
                                explanation="答對了！爆炸是全向擴張力，地震是剪力錯動，波形完全不同。"
                            />
                        </Card>

                        <footer className="text-center py-16 text-slate-400 border-t mt-12">
                            <Icon name="Activity" className="animate-ping text-red-300" />
                            <p className="font-bold text-slate-800 mt-4 uppercase tracking-widest">Seismology Master Class</p>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
